<script>
"use strict";
/* ============================================================================
 * SmallLisp - a small Lisp interpreter inspired by Norvig's lispy and rebuilt
 * around the bytecode VM design from chobocho/SimpleScheme.
 *
 * Pipeline:   source -> Lexer -> Parser -> Compiler (FunctionProto bytecode)
 *                                       -> VM (stack machine)
 *
 * Written in modern JavaScript that mirrors a TypeScript codebase: classes,
 * tagged value types, no untyped object soup. Type names appear in JSDoc so
 * the file passes through `tsc --checkJs` cleanly.
 *
 * Special forms: quote if define set! lambda begin let let* and or cond
 *                when unless
 * Number tower: BigInt for integers, Number for floats; mixed ops promote.
 * Closures capture lexical bindings as boxed Upvalue cells.
 * Tail calls reuse the current frame so deep recursion does not blow the
 * host JavaScript stack.
 * ========================================================================== */

/* ===================== Value types ===================== */

class Nil { toString() { return "()"; } }
const NIL = new Nil();

class Bool {
  constructor(v) { this.v = !!v; }
  toString() { return this.v ? "#t" : "#f"; }
}
const TRUE = new Bool(true);
const FALSE = new Bool(false);
function mkBool(v) { return v ? TRUE : FALSE; }

class IntV {
  constructor(v) { this.v = typeof v === "bigint" ? v : BigInt(v); }
  toString() { return this.v.toString(); }
}

class FloatV {
  constructor(v) { this.v = +v; }
  toString() {
    const n = this.v;
    if (!Number.isFinite(n)) return Number.isNaN(n) ? "+nan.0" : (n > 0 ? "+inf.0" : "-inf.0");
    let s = String(n);
    if (!/[.eE]/.test(s)) s += ".0";
    return s;
  }
}

class StrV {
  constructor(v) { this.v = String(v); }
  toString() { return JSON.stringify(this.v); }
}

class Sym {
  constructor(v) { this.v = String(v); }
  toString() { return this.v; }
}
const SYMTAB = new Map();
function intern(name) {
  let s = SYMTAB.get(name);
  if (!s) { s = new Sym(name); SYMTAB.set(name, s); }
  return s;
}
function isSymNamed(v, name) { return v instanceof Sym && v.v === name; }

class Pair {
  constructor(car, cdr) { this.car = car; this.cdr = cdr; }
  toString() {
    let out = "(" + lispWrite(this.car);
    let cur = this.cdr;
    while (true) {
      if (cur instanceof Nil) return out + ")";
      if (cur instanceof Pair) { out += " " + lispWrite(cur.car); cur = cur.cdr; continue; }
      return out + " . " + lispWrite(cur) + ")";
    }
  }
}

class Builtin {
  constructor(name, fn) { this.name = name; this.fn = fn; }
  toString() { return "#<builtin:" + this.name + ">"; }
}

class FunctionProto {
  constructor(name) {
    this.name = name || "";
    this.code = [];          // Array<{op:number, arg:number, line?:number}>
    this.consts = [];        // Array<Value>
    this.numParams = 0;
    this.hasRest = false;
    this.numLocals = 0;
    this.upvalueSpecs = [];  // Array<{index:number, isLocal:boolean}>
  }
  toString() { return "#<proto:" + (this.name || "<lambda>") + ">"; }
}

class Upvalue {
  constructor(value) { this.value = value; }
}

class Closure {
  constructor(proto, upvalues, name) {
    this.proto = proto;
    this.upvalues = upvalues || [];
    this.name = name || "";
  }
  toString() { return "#<closure:" + (this.name || this.proto.name || "<lambda>") + ">"; }
}

function isTruthy(v) {
  if (v instanceof Bool) return v.v;
  return true; // every non-#f value is truthy, including ()
}

function eqValue(a, b) {
  if (a === b) return true;
  if (a instanceof Nil && b instanceof Nil) return true;
  if (a instanceof Bool && b instanceof Bool) return a.v === b.v;
  if (a instanceof Sym && b instanceof Sym) return a.v === b.v;
  if (a instanceof IntV && b instanceof IntV) return a.v === b.v;
  if (a instanceof FloatV && b instanceof FloatV) return a.v === b.v;
  if (a instanceof StrV && b instanceof StrV) return a.v === b.v;
  return false;
}

function equalValue(a, b) {
  if (eqValue(a, b)) return true;
  if (a instanceof Pair && b instanceof Pair)
    return equalValue(a.car, b.car) && equalValue(a.cdr, b.cdr);
  return false;
}

function pairToArray(v) {
  const out = [];
  while (v instanceof Pair) { out.push(v.car); v = v.cdr; }
  return out;
}

function arrayToList(arr) {
  let r = NIL;
  for (let i = arr.length - 1; i >= 0; i--) r = new Pair(arr[i], r);
  return r;
}

function lispWrite(v) {
  if (v == null) return "<nil>";
  return v.toString();
}

function lispDisplay(v) {
  if (v instanceof StrV) return v.v;
  if (v instanceof Sym)  return v.v;
  return lispWrite(v);
}

/* ===================== Lexer ===================== */

const TK = Object.freeze({
  EOF: 0, LPAREN: 1, RPAREN: 2,
  QUOTE: 3, QUASIQUOTE: 4, UNQUOTE: 5, UNQUOTE_SPLICING: 6,
  DOT: 7, BOOL: 8, NUMBER: 9, STRING: 10, SYMBOL: 11,
});

class Lexer {
  constructor(src) {
    this.src = src;
    this.pos = 0;
    this.line = 1;
    this.col = 1;
  }
  peek(off) {
    const p = this.pos + (off | 0);
    return p < this.src.length ? this.src[p] : "";
  }
  advance() {
    const ch = this.src[this.pos++];
    if (ch === "\n") { this.line++; this.col = 1; } else { this.col++; }
    return ch;
  }
  isSpace(c) { return c === " " || c === "\t" || c === "\n" || c === "\r" || c === "\f" || c === "\v"; }
  isDigit(c) { return c >= "0" && c <= "9"; }
  isDelim(c) {
    return c === "" || this.isSpace(c)
      || c === "(" || c === ")" || c === '"' || c === ";"
      || c === "'" || c === "`" || c === ",";
  }
  skip() {
    while (this.pos < this.src.length) {
      const c = this.peek(0);
      if (this.isSpace(c)) { this.advance(); continue; }
      if (c === ";") {
        while (this.pos < this.src.length && this.peek(0) !== "\n") this.advance();
        continue;
      }
      break;
    }
  }
  next() {
    this.skip();
    const line = this.line, col = this.col;
    if (this.pos >= this.src.length) return { kind: TK.EOF, text: "", line, col };
    const c = this.peek(0);
    switch (c) {
      case "(": this.advance(); return { kind: TK.LPAREN, text: "(", line, col };
      case ")": this.advance(); return { kind: TK.RPAREN, text: ")", line, col };
      case "'": this.advance(); return { kind: TK.QUOTE, text: "'", line, col };
      case "`": this.advance(); return { kind: TK.QUASIQUOTE, text: "`", line, col };
      case ",":
        this.advance();
        if (this.peek(0) === "@") { this.advance(); return { kind: TK.UNQUOTE_SPLICING, text: ",@", line, col }; }
        return { kind: TK.UNQUOTE, text: ",", line, col };
      case '"': return this.readString(line, col);
      case "#": {
        this.advance();
        const n = this.peek(0);
        if (n === "t" || n === "f") { this.advance(); return { kind: TK.BOOL, text: n, line, col }; }
        throw new LispError("lexer: unexpected '#" + n + "'", line, col);
      }
    }
    if (this.isDigit(c)) return this.readNumber(line, col);
    if ((c === "+" || c === "-") && this.isDigit(this.peek(1))) return this.readNumber(line, col);
    if (c === ".") {
      if (this.isDelim(this.peek(1))) { this.advance(); return { kind: TK.DOT, text: ".", line, col }; }
      return this.readSymbol(line, col);
    }
    return this.readSymbol(line, col);
  }
  readString(line, col) {
    this.advance(); // opening "
    let out = "";
    while (this.pos < this.src.length && this.peek(0) !== '"') {
      const ch = this.advance();
      if (ch === "\\" && this.pos < this.src.length) {
        const esc = this.advance();
        switch (esc) {
          case "n": out += "\n"; break;
          case "t": out += "\t"; break;
          case "r": out += "\r"; break;
          case "\\": out += "\\"; break;
          case '"': out += '"'; break;
          case "0": out += "\0"; break;
          default: out += esc;
        }
        continue;
      }
      out += ch;
    }
    if (this.pos >= this.src.length) throw new LispError("lexer: unterminated string", line, col);
    this.advance(); // closing "
    return { kind: TK.STRING, text: out, line, col };
  }
  readNumber(line, col) {
    const start = this.pos;
    if (this.peek(0) === "+" || this.peek(0) === "-") this.advance();
    while (this.pos < this.src.length && !this.isDelim(this.peek(0))) this.advance();
    return { kind: TK.NUMBER, text: this.src.slice(start, this.pos), line, col };
  }
  readSymbol(line, col) {
    const start = this.pos;
    while (this.pos < this.src.length && !this.isDelim(this.peek(0))) this.advance();
    return { kind: TK.SYMBOL, text: this.src.slice(start, this.pos), line, col };
  }
}

class LispError extends Error {
  constructor(msg, line, col) {
    super(line ? msg + " (line " + line + ":" + col + ")" : msg);
    this.line = line;
    this.col = col;
  }
}

/* ===================== Parser ===================== */

class Parser {
  constructor(src) {
    this.lex = new Lexer(src);
    this.cur = this.lex.next();
  }
  advance() { this.cur = this.lex.next(); }
  parseAll() {
    const out = [];
    while (this.cur.kind !== TK.EOF) out.push(this.parseExpr());
    return out;
  }
  parseExpr() {
    const t = this.cur;
    switch (t.kind) {
      case TK.LPAREN: return this.parseList();
      case TK.RPAREN: throw new LispError("parser: unexpected ')'", t.line, t.col);
      case TK.QUOTE:            this.advance(); return list2(intern("quote"), this.parseExpr());
      case TK.QUASIQUOTE:       this.advance(); return list2(intern("quasiquote"), this.parseExpr());
      case TK.UNQUOTE:          this.advance(); return list2(intern("unquote"), this.parseExpr());
      case TK.UNQUOTE_SPLICING: this.advance(); return list2(intern("unquote-splicing"), this.parseExpr());
      case TK.BOOL:    this.advance(); return mkBool(t.text === "t");
      case TK.NUMBER:  this.advance(); return parseNumber(t.text, t.line, t.col);
      case TK.STRING:  this.advance(); return new StrV(t.text);
      case TK.SYMBOL:  this.advance(); return intern(t.text);
      case TK.DOT:     throw new LispError("parser: unexpected '.'", t.line, t.col);
    }
    throw new LispError("parser: unexpected token", t.line, t.col);
  }
  parseList() {
    const open = this.cur;
    this.advance();
    const items = [];
    let tail = NIL;
    while (this.cur.kind !== TK.RPAREN) {
      if (this.cur.kind === TK.EOF) throw new LispError("parser: unexpected EOF in list", open.line, open.col);
      if (this.cur.kind === TK.DOT) {
        this.advance();
        tail = this.parseExpr();
        if (this.cur.kind !== TK.RPAREN) throw new LispError("parser: expected ')' after dotted tail", this.cur.line, this.cur.col);
        break;
      }
      items.push(this.parseExpr());
    }
    this.advance();
    let r = tail;
    for (let i = items.length - 1; i >= 0; i--) r = new Pair(items[i], r);
    return r;
  }
}

function list2(a, b) { return new Pair(a, new Pair(b, NIL)); }

function parseNumber(s, line, col) {
  // Try BigInt first (no decimal, no exponent)
  if (/^[+-]?[0-9]+$/.test(s)) {
    try { return new IntV(BigInt(s)); } catch (_) { /* fallthrough */ }
  }
  const f = Number(s);
  if (!Number.isFinite(f) && s !== "+inf.0" && s !== "-inf.0") {
    throw new LispError("parser: bad number '" + s + "'", line, col);
  }
  return new FloatV(f);
}

/* ===================== Bytecode ===================== */

const OP = Object.freeze({
  NOP: 0,
  LOAD_CONST: 1, LOAD_NIL: 2, LOAD_TRUE: 3, LOAD_FALSE: 4,
  LOAD_LOCAL: 5, STORE_LOCAL: 6,
  LOAD_GLOBAL: 7, DEFINE_GLOBAL: 8, STORE_GLOBAL: 9,
  LOAD_UPVALUE: 10, STORE_UPVALUE: 11,
  POP: 12, DUP: 13,
  JUMP: 14, JUMP_IF_FALSE: 15, JUMP_IF_TRUE: 16,
  CALL: 17, TAIL_CALL: 18, RETURN: 19,
  MAKE_CLOSURE: 20, HALT: 21,
});
const OP_NAME = Object.fromEntries(Object.entries(OP).map(([k, v]) => [v, k]));

function disassemble(p, indent = "") {
  let out = indent + "== " + (p.name || "<lambda>") +
    " == (params=" + p.numParams + " rest=" + p.hasRest +
    " locals=" + p.numLocals + " upvals=" + p.upvalueSpecs.length + ")\n";
  for (let i = 0; i < p.code.length; i++) {
    const ins = p.code[i];
    const name = OP_NAME[ins.op] || ("OP(" + ins.op + ")");
    let line = indent + String(i).padStart(4, "0") + "  " + name.padEnd(15);
    if (ins.op === OP.LOAD_CONST || ins.op === OP.LOAD_GLOBAL ||
        ins.op === OP.DEFINE_GLOBAL || ins.op === OP.STORE_GLOBAL ||
        ins.op === OP.MAKE_CLOSURE) {
      const c = p.consts[ins.arg];
      line += " " + ins.arg + " ; " + (c == null ? "?" : c.toString());
    } else if (ins.op === OP.JUMP || ins.op === OP.JUMP_IF_FALSE || ins.op === OP.JUMP_IF_TRUE) {
      line += " " + (ins.arg >= 0 ? "+" + ins.arg : ins.arg) + " ; -> " + (i + 1 + ins.arg);
    } else {
      line += " " + ins.arg;
    }
    out += line + "\n";
  }
  for (let i = 0; i < p.consts.length; i++) {
    const c = p.consts[i];
    if (c instanceof FunctionProto) {
      out += "\n" + indent + "-- const[" + i + "] --\n" + disassemble(c, indent);
    }
  }
  return out;
}

/* ===================== Compiler ===================== */

const SPECIAL = new Set([
  "quote", "if", "define", "set!", "lambda", "begin",
  "let", "let*", "and", "or", "cond", "when", "unless",
]);

class Compiler {
  constructor(parent, name) {
    this.parent = parent;
    this.proto = new FunctionProto(name || "");
    this.locals = []; // {name:Sym, depth:number, defined:boolean, captured:boolean}
    this.scopeDepth = 0;
  }
  emit(op, arg) {
    this.proto.code.push({ op: op, arg: (arg | 0) });
    return this.proto.code.length - 1;
  }
  patchJump(at) {
    this.proto.code[at].arg = this.proto.code.length - at - 1;
  }
  addConst(v) {
    // De-dup primitive consts (skip protos to keep nested closures distinct)
    if (!(v instanceof FunctionProto)) {
      for (let i = 0; i < this.proto.consts.length; i++) {
        if (eqValue(this.proto.consts[i], v)) return i;
      }
    }
    this.proto.consts.push(v);
    return this.proto.consts.length - 1;
  }
  addLocal(sym) {
    this.locals.push({ name: sym, depth: this.scopeDepth, defined: false, captured: false });
    if (this.locals.length > this.proto.numLocals) this.proto.numLocals = this.locals.length;
    return this.locals.length - 1;
  }
  markDefined(slot) { this.locals[slot].defined = true; }
  resolveLocal(sym) {
    for (let i = this.locals.length - 1; i >= 0; i--) {
      if (this.locals[i].name.v === sym.v) return i;
    }
    return -1;
  }
  addUpvalue(index, isLocal) {
    for (let i = 0; i < this.proto.upvalueSpecs.length; i++) {
      const u = this.proto.upvalueSpecs[i];

const VM_MAX_STEPS = 50_000_000;

          const ups = new Array(proto.upvalueSpecs.length);

          throw new LispError("vm: unknown opcode " + ins.op);
      }

  }
}

function bNumEq(args) { return numChain("=",  args, c => c === 0); }
function bLt   (args) { return numChain("<",  args, c => c <  0); }
function bGt   (args) { return numChain(">",  args, c => c >  0); }
function bLe   (args) { return numChain("<=", args, c => c <= 0); }
function bGe   (args) { return numChain(">=", args, c => c >= 0); }

function bNot(args)     { arity("not",     args, 1); return mkBool(!isTruthy(args[0])); }
function bZeroQ(args)   {
  arity("zero?", args, 1);
  if (args[0] instanceof IntV)   return mkBool(args[0].v === 0n);
  if (args[0] instanceof FloatV) return mkBool(args[0].v === 0);
  return FALSE;
}
function bNullQ(args)   { arity("null?",   args, 1); return mkBool(args[0] instanceof Nil); }
function bPairQ(args)   { arity("pair?",   args, 1); return mkBool(args[0] instanceof Pair); }
function bNumberQ(args) { arity("number?", args, 1); return mkBool(isNumber(args[0])); }
function bIntegerQ(args){ arity("integer?",args, 1); return mkBool(args[0] instanceof IntV); }
function bStringQ(args) { arity("string?", args, 1); return mkBool(args[0] instanceof StrV); }
function bSymbolQ(args) { arity("symbol?", args, 1); return mkBool(args[0] instanceof Sym); }
function bBooleanQ(args){ arity("boolean?",args, 1); return mkBool(args[0] instanceof Bool); }
function bProcQ(args)   { arity("procedure?", args, 1); return mkBool(args[0] instanceof Builtin || args[0] instanceof Closure); }
function bListQ(args)   {
  arity("list?", args, 1);
  let v = args[0];
  while (v instanceof Pair) v = v.cdr;
  return mkBool(v instanceof Nil);
}

function bCar(args) { arity("car", args, 1); if (!(args[0] instanceof Pair)) throw new LispError("car: not a pair"); return args[0].car; }
function bCdr(args) { arity("cdr", args, 1); if (!(args[0] instanceof Pair)) throw new LispError("cdr: not a pair"); return args[0].cdr; }
function bCons(args){ arity("cons", args, 2); return new Pair(args[0], args[1]); }
function bList(args){ return arrayToList(args); }
function bLength(args) {
  arity("length", args, 1);
  let n = 0, cur = args[0];
  while (cur instanceof Pair) { n++; cur = cur.cdr; }
  if (!(cur instanceof Nil)) throw new LispError("length: improper list");
  return new IntV(BigInt(n));
}
function bReverse(args) {
  arity("reverse", args, 1);
  let r = NIL, cur = args[0];
  while (cur instanceof Pair) { r = new Pair(cur.car, r); cur = cur.cdr; }
  if (!(cur instanceof Nil)) throw new LispError("reverse: improper list");
  return r;
}
function bAppend(args) {
  if (args.length === 0) return NIL;
  let last = args[args.length - 1];
  for (let i = args.length - 2; i >= 0; i--) {
    const items = pairToArray(args[i]);
    for (let j = items.length - 1; j >= 0; j--) last = new Pair(items[j], last);
  }
  return last;
}
function bMap(args, vm) {
  arityAtLeast("map", args, 2);
  const fn = args[0];
  const lists = args.slice(1).map(pairToArray);
  const n = Math.min(...lists.map(l => l.length));
  const out = [];
  for (let i = 0; i < n; i++) {
    const callArgs = lists.map(l => l[i]);
    out.push(vmCall(vm, fn, callArgs, "map"));
  }
  return arrayToList(out);
}
function bFilter(args, vm) {
  arity("filter", args, 2);
  const fn = args[0];
  const items = pairToArray(args[1]);
  const out = [];
  for (const it of items) if (isTruthy(vmCall(vm, fn, [it], "filter"))) out.push(it);
  return arrayToList(out);
}
function bFoldl(args, vm) {
  arity("foldl", args, 3);
  const [fn, init, lst] = args;
  let acc = init;
  for (const it of pairToArray(lst)) acc = vmCall(vm, fn, [acc, it], "foldl");
  return acc;
}
function bForEach(args, vm) {
  arityAtLeast("for-each", args, 2);
  const fn = args[0];
  const lists = args.slice(1).map(pairToArray);
  const n = Math.min(...lists.map(l => l.length));
  for (let i = 0; i < n; i++) vmCall(vm, fn, lists.map(l => l[i]), "for-each");
  return NIL;
}
function bApply(args, vm) {
  arityAtLeast("apply", args, 2);
  const fn = args[0];
  const callArgs = args.slice(1, -1);
  const tail = pairToArray(args[args.length - 1]);
  return vmCall(vm, fn, callArgs.concat(tail), "apply");
}

function bEqQ(args)    { arity("eq?",    args, 2); return mkBool(eqValue(args[0], args[1])); }
function bEqualQ(args) { arity("equal?", args, 2); return mkBool(equalValue(args[0], args[1])); }

function bStrLen(args) {
  arity("string-length", args, 1);
  if (!(args[0] instanceof StrV)) throw new LispError("string-length: not a string");
  return new IntV(BigInt([...args[0].v].length));
}
function bStrAppend(args) {
  let out = "";
  for (const a of args) {
    if (!(a instanceof StrV)) throw new LispError("string-append: not a string");
    out += a.v;
  }
  return new StrV(out);
}
function bStrSplit(args) {
  arity("string-split", args, 2);
  const [s, sep] = args;
  if (!(s instanceof StrV) || !(sep instanceof StrV)) throw new LispError("string-split: string args required");
  const parts = sep.v === "" ? [...s.v] : s.v.split(sep.v);
  return arrayToList(parts.map(p => new StrV(p)));
}
function bStrJoin(args) {
  arity("string-join", args, 2);
  const lst = pairToArray(args[0]);
  if (!(args[1] instanceof StrV)) throw new LispError("string-join: separator must be a string");
  const parts = lst.map(v => {
    if (!(v instanceof StrV)) throw new LispError("string-join: list element not a string");
    return v.v;
  });
  return new StrV(parts.join(args[1].v));
}
function bStrContains(args) {
  arity("string-contains?", args, 2);
  const [s, sub] = args;
  if (!(s instanceof StrV) || !(sub instanceof StrV)) throw new LispError("string-contains?: string args");
  return mkBool(s.v.includes(sub.v));
}
function bStrReplace(args) {
  arity("string-replace", args, 3);
  const [s, o, n] = args;
  if (!(s instanceof StrV) || !(o instanceof StrV) || !(n instanceof StrV)) throw new LispError("string-replace: string args");
  return new StrV(s.v.split(o.v).join(n.v));
}
function bSubstring(args) {
  if (args.length < 2 || args.length > 3) throw new LispError("substring: 2 or 3 args");
  if (!(args[0] instanceof StrV)) throw new LispError("substring: not a string");
  const rs = [...args[0].v];
  if (!(args[1] instanceof IntV)) throw new LispError("substring: index must be int");
  const si = Number(args[1].v);
  const ei = args.length === 3 ? (args[2] instanceof IntV ? Number(args[2].v) : (() => { throw new LispError("substring: index must be int"); })()) : rs.length;
  if (si < 0 || ei > rs.length || si > ei) throw new LispError("substring: index out of range");
  return new StrV(rs.slice(si, ei).join(""));
}
function bNumToStr(args) {
  arity("number->string", args, 1);
  if (args[0] instanceof IntV)   return new StrV(args[0].v.toString());
  if (args[0] instanceof FloatV) return new StrV(args[0].toString());
  throw new LispError("number->string: not a number");
}
function bStrToNum(args) {
  arity("string->number", args, 1);
  if (!(args[0] instanceof StrV)) throw new LispError("string->number: not a string");
  try { return parseNumber(args[0].v, 0, 0); } catch (_) { return FALSE; }
}
function bSymToStr(args) {
  arity("symbol->string", args, 1);
  if (!(args[0] instanceof Sym)) throw new LispError("symbol->string: not a symbol");
  return new StrV(args[0].v);
}
function bStrToSym(args) {
  arity("string->symbol", args, 1);
  if (!(args[0] instanceof StrV)) throw new LispError("string->symbol: not a string");
  return intern(args[0].v);
}

// I/O routes through the host's writer (UI prints into the output pane).
let ioWriter = (s) => { /* default: drop */ };
function setIoWriter(w) { ioWriter = w; }

function bDisplay(args) {
  let out = "";
  for (let i = 0; i < args.length; i++) {
    if (i > 0) out += " ";
    out += lispDisplay(args[i]);
  }
  ioWriter(out);
  return NIL;
}
function bWrite(args) {
  let out = "";
  for (let i = 0; i < args.length; i++) {
    if (i > 0) out += " ";
    out += lispWrite(args[i]);
  }
  ioWriter(out);
  return NIL;
}
function bNewline(_args) { ioWriter("\n"); return NIL; }
function bPrint(args) {
  let out = "";
  for (let i = 0; i < args.length; i++) {
    if (i > 0) out += " ";
    out += lispDisplay(args[i]);
  }
  ioWriter(out + "\n");
  return NIL;
}

function bMin(args) {
  arityAtLeast("min", args, 1);
  let best = args[0];
  for (let i = 1; i < args.length; i++) if (numCmp(args[i], best) < 0) best = args[i];
  return best;
}
function bMax(args) {
  arityAtLeast("max", args, 1);
  let best = args[0];
  for (let i = 1; i < args.length; i++) if (numCmp(args[i], best) > 0) best = args[i];
  return best;
}
function bAbs(args) {
  arity("abs", args, 1);
  if (args[0] instanceof IntV) return new IntV(args[0].v < 0n ? -args[0].v : args[0].v);
  if (args[0] instanceof FloatV) return new FloatV(Math.abs(args[0].v));
  throw new LispError("abs: not a number");
}
function bExpt(args) {
  arity("expt", args, 2);
  const [b, e] = args;
  if (b instanceof IntV && e instanceof IntV && e.v >= 0n) {
    return new IntV(b.v ** e.v);
  }
  return new FloatV(Math.pow(toFloat(b), toFloat(e)));
}
function bSqrt(args) { arity("sqrt", args, 1); return new FloatV(Math.sqrt(toFloat(args[0]))); }
function bFloor(args){ arity("floor", args, 1); if (args[0] instanceof IntV) return args[0]; return new FloatV(Math.floor(toFloat(args[0]))); }
function bCeil(args) { arity("ceiling", args, 1); if (args[0] instanceof IntV) return args[0]; return new FloatV(Math.ceil(toFloat(args[0]))); }
function bRound(args){ arity("round", args, 1); if (args[0] instanceof IntV) return args[0]; return new FloatV(Math.round(toFloat(args[0]))); }
function bExactToInexact(args) { arity("exact->inexact", args, 1); return new FloatV(toFloat(args[0])); }
function bInexactToExact(args) {
  arity("inexact->exact", args, 1);
  if (args[0] instanceof IntV) return args[0];
  if (args[0] instanceof FloatV) return new IntV(BigInt(Math.trunc(args[0].v)));
  throw new LispError("inexact->exact: not a number");
}

function vmCall(vm, fn, args, where) {
  if (fn instanceof Builtin) return fn.fn(args, vm);
  if (!(fn instanceof Closure)) throw new LispError(where + ": not callable: " + lispWrite(fn));
  // Run a fresh sub-loop: push the closure call, run until that frame returns.
  const baseFrames = vm.frames.length;
  vm.callClosure(fn, args);
  let steps = 0;
  while (vm.frames.length > baseFrames) {
    if (++steps > VM_MAX_STEPS) throw new LispError("vm: step limit exceeded");
    const frame = vm.frames[vm.frames.length - 1];
    const code = frame.closure.proto.code;
    if (frame.pc >= code.length) throw new LispError("vm: pc out of range");
    const ins = code[frame.pc++];
    runOne(vm, frame, ins);
  }
  return vm.pop();
}

// runOne: a single-instruction step shared by sub-loops invoked from builtins
// (map/filter/foldl/apply). Mirrors VM.runLoop without re-entering it.
function runOne(vm, frame, ins) {
  switch (ins.op) {
    case OP.NOP: return;
    case OP.LOAD_CONST: vm.push(frame.closure.proto.consts[ins.arg]); return;
    case OP.LOAD_NIL:   vm.push(NIL); return;
    case OP.LOAD_TRUE:  vm.push(TRUE); return;
    case OP.LOAD_FALSE: vm.push(FALSE); return;
    case OP.LOAD_LOCAL: vm.push(frame.locals[ins.arg].value); return;
    case OP.STORE_LOCAL: frame.locals[ins.arg].value = vm.pop(); return;
    case OP.LOAD_GLOBAL: {
      const sym = frame.closure.proto.consts[ins.arg];
      if (!vm.globals.has(sym.v)) throw new LispError("undefined variable: " + sym.v);
      vm.push(vm.globals.get(sym.v));
      return;
    }
    case OP.DEFINE_GLOBAL: {
      const sym = frame.closure.proto.consts[ins.arg];
      const val = vm.pop();
      if (val instanceof Closure && !val.name) {
        val.name = sym.v;
        if (!val.proto.name) val.proto.name = sym.v;
      }
      vm.globals.set(sym.v, val);
      return;
    }
    case OP.STORE_GLOBAL: {
      const sym = frame.closure.proto.consts[ins.arg];
      if (!vm.globals.has(sym.v)) throw new LispError("set!: undefined variable: " + sym.v);
      vm.globals.set(sym.v, vm.pop());
      return;
    }
    case OP.LOAD_UPVALUE: vm.push(frame.closure.upvalues[ins.arg].value); return;
    case OP.STORE_UPVALUE: frame.closure.upvalues[ins.arg].value = vm.pop(); return;
    case OP.POP: vm.pop(); return;
    case OP.DUP: vm.push(vm.peek()); return;
    case OP.JUMP: frame.pc += ins.arg; return;
    case OP.JUMP_IF_FALSE: { const v = vm.pop(); if (!isTruthy(v)) frame.pc += ins.arg; return; }
    case OP.JUMP_IF_TRUE:  { const v = vm.pop(); if ( isTruthy(v)) frame.pc += ins.arg; return; }
    case OP.CALL: {
      const n = ins.arg;
      const args = vm.popN(n);
      const fn = vm.pop();
      if (fn instanceof Builtin)      vm.push(fn.fn(args, vm));
      else if (fn instanceof Closure) vm.callClosure(fn, args);
      else throw new LispError("not callable: " + lispWrite(fn));
      return;
    }
    case OP.TAIL_CALL: {
      const n = ins.arg;
      const args = vm.popN(n);
      const fn = vm.pop();
      if (fn instanceof Builtin) {
        vm.push(fn.fn(args, vm));
        vm.doReturn();
      } else if (fn instanceof Closure) {
        const cur = vm.frames[vm.frames.length - 1];
        vm.stack.length = cur.stackBase;
        vm.frames.pop();
        vm.callClosure(fn, args);
      } else throw new LispError("not callable: " + lispWrite(fn));
      return;
    }
    case OP.RETURN: vm.doReturn(); return;
    case OP.MAKE_CLOSURE: {
      const proto = frame.closure.proto.consts[ins.arg];
      const ups = new Array(proto.upvalueSpecs.length);
      for (let i = 0; i < proto.upvalueSpecs.length; i++) {
        const spec = proto.upvalueSpecs[i];
        ups[i] = spec.isLocal ? frame.locals[spec.index] : frame.closure.upvalues[spec.index];
      }
      vm.push(new Closure(proto, ups, proto.name));
      return;
    }
    case OP.HALT: throw new LispError("vm: HALT in sub-loop");
  }
  throw new LispError("vm: unknown opcode " + ins.op);
}

function newGlobals() {
  const env = new Map();
  const reg = (name, fn) => env.set(name, new Builtin(name, fn));
  reg("+", bAdd); reg("-", bSub); reg("*", bMul); reg("/", bDivFloat);
  reg("//", bDivInt); reg("%", bMod); reg("modulo", bMod);
  reg("=", bNumEq); reg("<", bLt); reg(">", bGt); reg("<=", bLe); reg(">=", bGe);
  reg("not", bNot);
  reg("zero?", bZeroQ); reg("null?", bNullQ); reg("pair?", bPairQ); reg("list?", bListQ);
  reg("number?", bNumberQ); reg("integer?", bIntegerQ); reg("string?", bStringQ);
  reg("symbol?", bSymbolQ); reg("boolean?", bBooleanQ); reg("procedure?", bProcQ);
  reg("car", bCar); reg("cdr", bCdr); reg("cons", bCons); reg("list", bList);
  reg("length", bLength); reg("reverse", bReverse); reg("append", bAppend);
  reg("map", bMap); reg("filter", bFilter); reg("foldl", bFoldl);
  reg("for-each", bForEach); reg("apply", bApply);
  reg("eq?", bEqQ); reg("equal?", bEqualQ);
  reg("display", bDisplay); reg("write", bWrite); reg("newline", bNewline); reg("print", bPrint);
  reg("string-length", bStrLen); reg("string-append", bStrAppend);
  reg("string-split", bStrSplit); reg("string-join", bStrJoin);
  reg("string-contains?", bStrContains); reg("string-replace", bStrReplace);
  reg("substring", bSubstring);
  reg("number->string", bNumToStr); reg("string->number", bStrToNum);
  reg("symbol->string", bSymToStr); reg("string->symbol", bStrToSym);
  reg("min", bMin); reg("max", bMax); reg("abs", bAbs);
  reg("expt", bExpt); reg("sqrt", bSqrt);
  reg("floor", bFloor); reg("ceiling", bCeil); reg("round", bRound);
  reg("exact->inexact", bExactToInexact); reg("inexact->exact", bInexactToExact);
  return env;
}

/* ===================== Public API ===================== */

function compileSource(src) {
  const parser = new Parser(src);
  const exprs = parser.parseAll();
  return { proto: compileTopLevel(exprs), exprs };
}

function runSource(src, opts) {
  opts = opts || {};
  const { proto } = compileSource(src);
  const globals = opts.globals || newGlobals();
  const vm = new VM(globals);
  const result = vm.run(proto);
  return { result, proto, globals };
}

/* ===================== Persistence (IndexedDB) =====================
 * Object store: smalllisp.snippets keyed by `name`.
 * Auto-save reuses a reserved key (`__autosave__`) so a fresh page load
 * restores whatever was in the editor last time.
 * ================================================================== */

const DB_NAME = "smalllisp";
const DB_STORE = "snippets";
const DB_AUTO_KEY = "__autosave__";
let _dbPromise = null;

function db() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if (typeof indexedDB === "undefined") { reject(new Error("IndexedDB not available")); return; }
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const d = req.result;
      if (!d.objectStoreNames.contains(DB_STORE)) {
        d.createObjectStore(DB_STORE, { keyPath: "name" });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}

function dbPut(name, code) {
  return db().then(d => new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put({ name, code, updated: Date.now() });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  }));
}
function dbGet(name) {
  return db().then(d => new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(name);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  }));
}
function dbList() {
  return db().then(d => new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).getAll();
    req.onsuccess = () => resolve((req.result || []).filter(r => r.name !== DB_AUTO_KEY));
    req.onerror = () => reject(req.error);
  }));
}
function dbDel(name) {
  return db().then(d => new Promise((resolve, reject) => {
    const tx = d.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).delete(name);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  }));
}

  const statsEl     = $("stats");
  const snippetsSel = $("snippets");
  const exGroup     = $("ex-group");
  const savedGroup  = $("saved-group");
  const showBC      = $("showBytecode");
  const docNameEl   = $("docName");
  const autosaveEl  = $("autosave");
  const fileInput   = $("fileInput");
  const deleteBtn   = $("deleteSaved");
  const themeBtn    = $("theme");

  // ---- Theme ---------------------------------------------------------
  // Persisted under localStorage["smalllisp.theme"] = "dark" | "light".
  // Initial value falls back to the OS preference.
  function applyTheme(t) {
    const isLight = t === "light";
    document.body.classList.toggle("light", isLight);
    themeBtn.textContent = isLight ? "☀️" : "🌙";
    themeBtn.title = isLight ? "Switch to dark theme" : "Switch to light theme";
    try { localStorage.setItem("smalllisp.theme", isLight ? "light" : "dark"); } catch (_) {}
  }
  let savedTheme = null;
  try { savedTheme = localStorage.getItem("smalllisp.theme"); } catch (_) {}
  const prefersLight = !!(window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches);
  applyTheme(savedTheme || (prefersLight ? "light" : "dark"));
  themeBtn.addEventListener("click", () => {
    applyTheme(document.body.classList.contains("light") ? "dark" : "light");
  });

  // Populate examples dropdown.
  for (const ex of EXAMPLES) {
    const opt = document.createElement("option");
    opt.value = "ex:" + ex.name;
    opt.textContent = ex.name;
    exGroup.appendChild(opt);
  }

  const defaultCode = "; SmallLisp - bytecode VM Lisp\n; Pick an example above or write your own.\n\n" + EXAMPLES[1].code;
  let docName = null;       // null = unsaved/untitled, otherwise key in IndexedDB
  let lastSaved = "";       // last value persisted to autosave

  function setDocName(name) {
    docName = name;
    docNameEl.textContent = name ? ("📄 " + name) : "📄 untitled";
    deleteBtn.disabled = !name;
  }

  function flashSaved() {
    autosaveEl.classList.add("show");
    clearTimeout(flashSaved._t);
    flashSaved._t = setTimeout(() => autosaveEl.classList.remove("show"), 1200);
  }

  async function refreshSavedList() {
    let items = [];
    try { items = await dbList(); } catch (_) { /* no IndexedDB */ }
    items.sort((a, b) => (b.updated || 0) - (a.updated || 0));
    savedGroup.innerHTML = "";
    if (items.length === 0) {
      const opt = document.createElement("option");
      opt.value = ""; opt.disabled = true;
      opt.textContent = "(no saved snippets)";
      savedGroup.appendChild(opt);
    } else {
      for (const it of items) {
        const opt = document.createElement("option");
        opt.value = "sv:" + it.name;
        opt.textContent = it.name;
        savedGroup.appendChild(opt);
      }
    }
  }

  // Try restoring from IndexedDB autosave on load; fall back to default.
  (async () => {
    try {
      const auto = await dbGet(DB_AUTO_KEY);
      if (auto && typeof auto.code === "string" && auto.code.trim().length > 0) {
        sourceEl.value = auto.code;
        if (auto.docName) setDocName(auto.docName);
        else setDocName(null);
        lastSaved = auto.code;
      } else {
        sourceEl.value = defaultCode;
      }
    } catch (_) {
      sourceEl.value = defaultCode;
    }
    await refreshSavedList();
  })();

  // Debounced auto-save: persist editor contents and current docName.
  let saveTimer = null;
  function scheduleAutosave() {
    docNameEl.classList.add("dirty");
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      const code = sourceEl.value;
      try {
        await dbPut(DB_AUTO_KEY, code);
        // Also stamp the docName so reload knows what was open.
        try {
          const d = await db();
          await new Promise((resolve, reject) => {
            const tx = d.transaction(DB_STORE, "readwrite");
            const store = tx.objectStore(DB_STORE);
            store.put({ name: DB_AUTO_KEY, code, docName: docName || "", updated: Date.now() });
            tx.oncomplete = () => resolve();
            tx.onerror = () => reject(tx.error);
          });
        } catch (_) { /* ignore */ }
        lastSaved = code;
        docNameEl.classList.remove("dirty");
        flashSaved();
      } catch (_) { /* IndexedDB unavailable; ignore silently */ }
    }, 500);
  }

  function append(text, cls) {
    const span = document.createElement("span");
    if (cls) span.className = cls;
    span.textContent = text;
    outputEl.appendChild(span);
    outputEl.scrollTop = outputEl.scrollHeight;
  }
  function clearOutput() { outputEl.textContent = ""; }

  setIoWriter((s) => append(s));

  function run() {
    clearOutput();
    statusEl.textContent = "running...";
    statsEl.textContent = "";
    const t0 = performance.now();

    let parsed;
    try {
      parsed = new Parser(sourceEl.value).parseAll();
    } catch (e) {
      statusEl.textContent = "parse error";
      append("[parse] " + (e instanceof Error ? e.message : String(e)) + "\n", "err");
      return;
    }

    if (showBC.checked) {
      try {
        const proto = compileTopLevel(parsed);
        append("; ===== bytecode =====\n", "dim");
        append(disassemble(proto), "hl");
        append("; ====================\n\n", "dim");
      } catch (e) {
        append("[compile] " + (e instanceof Error ? e.message : String(e)) + "\n", "err");
      }
    }

    const globals = newGlobals();
    const vm = new VM(globals);
    try {
      // Run each top-level expression separately so a partial failure still
      // shows earlier results, and so the displayed value is the last one.
      for (const expr of parsed) {
        const sub = compileTopLevel([expr]);
        const r = vm.run(sub);
        if (!(r instanceof Nil)) append(lispWrite(r) + "\n", "ok");
      }
    } catch (e) {
      statusEl.textContent = "error";
      append("[error] " + (e instanceof Error ? e.message : String(e)) + "\n", "err");
      const t1 = performance.now();
      statsEl.textContent = ((t1 - t0).toFixed(1)) + " ms";
      return;
    }

    const t1 = performance.now();
    statusEl.textContent = "done";
    statsEl.textContent = ((t1 - t0).toFixed(1)) + " ms";
  }

  $("run").addEventListener("click", run);
  // 🧹 sweeps EVERYTHING: source, output, doc name. Confirm only if the
  // editor has unsaved content (so an empty editor stays a one-click op).
  $("clear").addEventListener("click", () => {
    if (sourceEl.value.trim() && !confirm("🧹 Clear editor and output?")) return;
    sourceEl.value = "";
    clearOutput();
    statusEl.textContent = "";
    statsEl.textContent = "";
    setDocName(null);
    scheduleAutosave();
    sourceEl.focus();
  });
  $("reset").addEventListener("click", () => {
    if (sourceEl.value && sourceEl.value !== defaultCode &&
        !confirm("Reset the editor to the default snippet?")) return;
    sourceEl.value = defaultCode;
    setDocName(null);
    scheduleAutosave();
  });

  // Snippets dropdown: examples (prefix "ex:") or saved (prefix "sv:")
  snippetsSel.addEventListener("change", async () => {
    const v = snippetsSel.value;
    if (!v) return;
    if (v.startsWith("ex:")) {
      const name = v.slice(3);
      const ex = EXAMPLES.find(e => e.name === name);
      if (ex) {
        sourceEl.value = ex.code;
        setDocName(null); // examples don't claim a save name
        scheduleAutosave();
      }
    } else if (v.startsWith("sv:")) {
      const name = v.slice(3);
      try {
        const rec = await dbGet(name);
        if (rec) {
          sourceEl.value = rec.code;
          setDocName(name);
          scheduleAutosave();
        }
      } catch (e) {
        alert("Load failed: " + (e && e.message ? e.message : e));
      }
    }
    snippetsSel.value = ""; // reset placeholder
  });

  // Save As: prompt for name, save to IndexedDB.
  $("saveAs").addEventListener("click", async () => {
    const suggested = docName || "snippet-" + new Date().toISOString().slice(0, 10);
    const name = prompt("🏷️ Save as (name):", suggested);
    if (!name) return;
    const trimmed = name.trim();
    if (!trimmed) return;
    if (trimmed === DB_AUTO_KEY) { alert("That name is reserved."); return; }
    try {
      const existing = await dbGet(trimmed);
      if (existing && trimmed !== docName &&
          !confirm("'" + trimmed + "' already exists. Overwrite?")) return;
      await dbPut(trimmed, sourceEl.value);
      setDocName(trimmed);
      lastSaved = sourceEl.value;
      docNameEl.classList.remove("dirty");
      flashSaved();
      await refreshSavedList();
    } catch (e) {
      alert("Save failed: " + (e && e.message ? e.message : e));
    }
  });

  // Delete the currently active saved snippet.
  deleteBtn.addEventListener("click", async () => {
    if (!docName) return;
    if (!confirm("🗑️ Delete saved snippet '" + docName + "'?")) return;
    try {
      await dbDel(docName);
      setDocName(null);
      await refreshSavedList();
    } catch (e) {
      alert("Delete failed: " + (e && e.message ? e.message : e));
    }
  });

  // Upload: open a local file into the editor.
  $("upload").addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => {
    const f = fileInput.files && fileInput.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => {
      sourceEl.value = String(reader.result || "");
      // Use the file's base name as the suggested doc name.
      const base = f.name.replace(/\.(lisp|scm|smalllisp|txt)$/i, "");
      setDocName(base || null);
      scheduleAutosave();
    };
    reader.onerror = () => alert("Upload failed: " + reader.error);
    reader.readAsText(f);
    fileInput.value = ""; // allow re-uploading the same file
  });

  // Download: produce a .lisp file from the current source.
  $("download").addEventListener("click", () => {
    const blob = new Blob([sourceEl.value], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (docName ? docName : "smalllisp-" + new Date().toISOString().slice(0, 10)) + ".lisp";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 0);
  });

  // Mark dirty + autosave as the user types.
  sourceEl.addEventListener("input", () => {
    if (sourceEl.value !== lastSaved) docNameEl.classList.add("dirty");
    scheduleAutosave();
  });

  sourceEl.addEventListener("keydown", (ev) => {
    if (ev.key === "Enter" && (ev.ctrlKey || ev.metaKey)) { ev.preventDefault(); run(); return; }
    if (ev.key === "s"     && (ev.ctrlKey || ev.metaKey)) { ev.preventDefault(); $("saveAs").click(); return; }
    if (ev.key === "Tab") {
      ev.preventDefault();
      const s = sourceEl.selectionStart, e = sourceEl.selectionEnd;
      sourceEl.setRangeText("  ", s, e, "end");
    }
  });

  // Flush pending autosave before unload so we never lose the last keystroke.
  window.addEventListener("beforeunload", () => {
    if (saveTimer) {
      clearTimeout(saveTimer);
      try { dbPut(DB_AUTO_KEY, sourceEl.value); } catch (_) {}
    }
  });
}

document.addEventListener("DOMContentLoaded", setupUI);

/* ===================== Self-test (runs once on load, not visible) =====
 * Lightweight sanity checks executed silently; failures log to console.
 * ============================================================== */
(function selfTest() {
  function expect(src, want) {
    try {
      const { result } = runSource(src);
      const got = lispWrite(result);
      if (got !== want) console.warn("self-test FAIL:", src, "=>", got, "want", want);
    } catch (e) {
      console.warn("self-test ERROR:", src, e);
    }
  }
  expect("(+ 1 2 3)", "6");
  expect("(- 10 3 2)", "5");
  expect("(* 2 3 4)", "24");
  expect("(if (= 1 1) 'yes 'no)", "yes");
  expect("(define x 7) x", "7");
  expect("((lambda (x y) (+ x y)) 3 4)", "7");
  expect("(define (f n) (if (= n 0) 1 (* n (f (- n 1))))) (f 5)", "120");
  expect("(let ((a 1) (b 2)) (+ a b))", "3");
  expect("(let* ((a 1) (b (+ a 1))) b)", "2");
  expect("(define (mk) (let ((n 0)) (lambda () (set! n (+ n 1)) n))) (define c (mk)) (c) (c) (c)", "3");
  expect("(map (lambda (x) (* x x)) '(1 2 3))", "(1 4 9)");
  expect("(filter (lambda (x) (> x 2)) '(1 2 3 4))", "(3 4)");
  expect("(foldl + 0 '(1 2 3 4))", "10");
  expect("(cond ((= 1 2) 'a) ((= 1 1) 'b) (else 'c))", "b");
  expect("(and 1 2 3)", "3");
  expect("(or #f #f 7)", "7");
  expect("(equal? '(1 2 3) (list 1 2 3))", "#t");
  expect("(reverse '(1 2 3))", "(3 2 1)");
  expect("(length '(a b c d))", "4");
})();
</script>
</body>
</html>
